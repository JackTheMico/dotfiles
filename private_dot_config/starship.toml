# Та╣ТЇ« schema ТЈљСЙЏУЄфтіеУАЦтЁе
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ЬѓХ](#9A348E)\
$os\
$username\
[Ьѓ░](bg:#DA627D fg:#9A348E)\
$directory\
[Ьѓ░](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[Ьѓ░](fg:#FCA17D bg:#86BBD8)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[Ьѓ░](fg:#86BBD8 bg:#06969A)\
$docker_context\
[Ьѓ░](fg:#06969A bg:#33658A)\
$time\
[Ьѓ░ ](fg:#33658A)\
$character
"""

right_format = """$all"""

# Disable the blank line at the start of the prompt
add_newline = false

# You can also replace your username with a neat symbol like №ёа  or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#9A348E"
disabled = true # Disabled by default

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "Рђд/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "з░ѕЎ "
"Downloads" = "№ђЎ "
"Music" = "№ђЂ "
"Pictures" = "№ђЙ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " з░ѕЎ№ёф "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important з░ѕЎ " = " з░ѕЎ№ёф "

[c]
symbol = "Ьўъ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "№їѕ "
style = "bg:#06969A"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = "ЬЅх "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "Ьўг "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "№љў"
style = "bg:#FCA17D"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "ЬўД "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "ЬЮи "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "ЬЅќ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "Ьўц "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "Ьюў"
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "з░єЦ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "Ьъе"
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = "Ьюи "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#33658A"
format = '[ РЎЦ $time ]($style)'
